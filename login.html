<!DOCTYPE html>
<html>
<head>
    <title>Login – HabitFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: #f5f5f4;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .card {
            background: white;
            border: 1px solid #ddd;
            border-radius: 12px;
            padding: 2rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        .brand {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 1.5rem;
        }
        .brand-icon { font-size: 1.4rem; }
        .brand-name { font-size: 15px; font-weight: 600; }
        h1 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
        .sub { font-size: 13px; color: #666; margin-bottom: 1.5rem; }
        .field { margin-bottom: 1rem; }
        label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 5px;
            letter-spacing: 0.06em;
        }
        input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            font-size: 14px;
            border: 1px solid #ddd;
            border-radius: 8px;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }
        input:focus { border-color: #534AB7; box-shadow: 0 0 0 3px #EEEDFE; }
        input.is-error { border-color: #A32D2D; box-shadow: 0 0 0 3px #FCEBEB; }
        input.is-valid { border-color: #0F6E56; }
        .err-msg {
            min-height: 18px;
            font-size: 11.5px;
            color: #A32D2D;
            margin-top: 4px;
        }
        .divider { height: 1px; background: #ddd; margin: 1.25rem 0; }
        button {
            width: 100%;
            height: 40px;
            background: #534AB7;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #3C3489; }
        button:disabled { background: #999; cursor: not-allowed; }
        .signup-row {
            text-align: center;
            font-size: 13px;
            color: #666;
            margin-top: 1rem;
        }
        .signup-row a {
            color: #534AB7;
            text-decoration: none;
            font-weight: 600;
        }
        .signup-row a:hover { text-decoration: underline; }
    </style>
</head>
<body>

<div class="card">
    <div class="brand">
        <div class="brand-icon">🎯</div>
        <span class="brand-name">HabitFlow</span>
    </div>

    <h1>Welcome back</h1>
    <p class="sub">Log in to continue your habit journey</p>

    <form onsubmit="return validateLogin();">
        <!-- Email -->
        <div class="field">
            <label for="loginEmail">Email address</label>
            <input type="email" id="loginEmail" placeholder="name@gmail.com">
            <p class="err-msg" id="emailError"></p>
        </div>

        <!-- Password -->
        <div class="field">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" placeholder="Enter your password">
            <p class="err-msg" id="passError"></p>
        </div>

        <div class="divider"></div>

        <button type="submit" id="loginBtn">Log in</button>
    </form>

    <p class="signup-row">
        Don't have an account? <a href="signup.html">Sign up</a>
    </p>
</div>

<script>
function validateLogin() {
    const email = document.getElementById("loginEmail").value.trim();
    const password = document.getElementById("loginPassword").value.trim();
    const emailError = document.getElementById("emailError");
    const passError = document.getElementById("passError");

    let isValid = true;

    // Reset error messages
    emailError.textContent = "";
    passError.textContent = "";

    // Basic validation
    if (email === "") {
        emailError.textContent = "Email is required";
        isValid = false;
    }
    if (password === "") {
        passError.textContent = "Password is required";
        isValid = false;
    }

    if (isValid) {
        // ✅ Redirect immediately after clicking login
        window.location.href = "https://ehsan.co.in/challenging.html"; 
        return false; // Prevents default form submission
    }

    return false; // Stops form submission if invalid
}
</script>


</body>
</html>
