<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - HabitFlow</title>
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-card">
        <div class="auth-header">
            <h1>🎯 HabitFlow</h1>
            <p>Create your account</p>
        </div>

        <form id="signupForm" onsubmit="return handleSignup(event);">

            <!-- Username -->
            <div class="form-group">
                <label>Username:</label>
                <input type="text" id="username" placeholder="Enter Username">
                <p id="userError" class="error-msg"></p>
            </div>

            <!-- Contact -->
            <div class="form-group">
                <label>Contact Number:</label>
                <input type="text" id="contact" placeholder="Enter 10 digit number">
                <p id="contactError" class="error-msg"></p>
            </div>

            <!-- Email -->
            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="Enter Email">
                <p id="emailError" class="error-msg"></p>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label>Password:</label>
                <input type="password" id="password" placeholder="Enter Password (6+ chars, letter + number)">
                <p id="passError" class="error-msg"></p>
            </div>

            <!-- Confirm Password -->
            <div class="form-group">
                <label>Confirm Password:</label>
                <input type="password" id="confirm" placeholder="Confirm Password">
                <p id="confirmError" class="error-msg"></p>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
        </form>

        <p class="auth-link">Already have an account? <a href="login.html">Log In</a></p>
    </div>
</div>

<script>
function validateForm(){

    let isValid = true;

 
    let username = document.getElementById("username").value;
    let contact = document.getElementById("contact").value;
    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;
    let confirm = document.getElementById("confirm").value;

   



    if(username.length < 4){
        document.getElementById("userError").textContent = "Username must be 4+ characters";
        isValid = false;
    }

  
    let phonePattern = /^[0-9]{10}$/;
    if(!phonePattern.test(contact)){
        document.getElementById("contactError").textContent = "Invalid contact number";
        isValid = false;
    }

   
    let emailPattern = /^[^ ]+@[^ ]+\.[a-z]{2,3}$/;
    if(!emailPattern.test(email)){
        document.getElementById("emailError").textContent = "Invalid email";
        isValid = false;
    }


    if(password.length < 6){
        document.getElementById("passError").textContent = "Password must be 6+ characters";
        isValid = false;
    }

    if(password !== confirm){
        document.getElementById("confirmError").textContent = "Passwords do not match";
        isValid = false;
    }

    if(isValid){
        alert("Form submitted successfully!");
    }

    return isValid;
}
</script>
</body>
</html>
